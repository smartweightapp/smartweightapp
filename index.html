<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VitaTrack — Health Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── DESIGN TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:         #060A12;
      --bg-card:    #0C1220;
      --bg-input:   #111827;
      --border:     rgba(255,255,255,0.07);
      --border-act: rgba(181,255,77,0.4);
      --lime:       #B5FF4D;
      --lime-dim:   rgba(181,255,77,0.12);
      --ice:        #7DF9FF;
      --ice-dim:    rgba(125,249,255,0.10);
      --amber:      #FFB84D;
      --rose:       #FF4D88;
      --text-1:     #F9FAFB;
      --text-2:     #9CA3AF;
      --text-3:     #4B5563;
      --font-main: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--font-main);
      line-height: 1.5;
      padding-bottom: 5rem;
      overflow-x: hidden;
    }

    /* ── LAYOUT ────────────────────────────────────────────────── */
    .container { max-width: 480px; margin: 0 auto; padding: 1.25rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .brand { font-weight: 800; font-size: 1.4rem; letter-spacing: -0.02em; color: var(--lime); }
    
    .sync-badge {
      font-family: var(--font-mono); font-size: 0.65rem; padding: 0.25rem 0.6rem;
      border-radius: 20px; background: var(--bg-card); border: 1px solid var(--border);
    }
    .sync-badge.online { color: var(--lime); border-color: var(--lime-dim); }
    .sync-badge.syncing { color: var(--amber); }

    /* ── PROFILE SELECTOR ──────────────────────────────────────── */
    .profile-tabs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
      background: var(--bg-card); padding: 0.35rem; border-radius: 12px; margin-bottom: 1.5rem;
    }
    .p-tab {
      background: transparent; border: none; color: var(--text-2); padding: 0.6rem;
      border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .p-tab.active { background: var(--bg-input); color: var(--lime); border: 1px solid var(--border-act); }

    /* ── CARDS & FORMS ─────────────────────────────────────────── */
    .card { background: var(--bg-card); border-radius: 20px; padding: 1.5rem; border: 1px solid var(--border); margin-bottom: 1.25rem; }
    .form-card { background: var(--bg-input); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
    .form-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; }
    
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.75rem; color: var(--text-2); margin-bottom: 0.4rem; font-weight: 600; }
    input, select {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.75rem; color: var(--text-1); font-family: var(--font-mono); font-size: 0.9rem;
    }
    input:focus { outline: none; border-color: var(--lime); }

    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .btn-primary {
      width: 100%; background: var(--lime); color: var(--bg); border: none;
      padding: 0.9rem; border-radius: 12px; font-weight: 800; font-size: 0.9rem;
      cursor: pointer; transition: 0.2s;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

    /* ── SUMMARY SECTION ──────────────────────────────────────── */
    .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .balance-card { padding: 1.25rem; border-radius: 16px; border: 1px solid var(--border); }
    .balance-card.cal { background: var(--lime-dim); border-color: var(--lime-dim); }
    .balance-title { font-size: 0.7rem; font-weight: 700; color: var(--text-2); text-transform: uppercase; margin-bottom: 0.25rem; }
    .balance-val { font-size: 1.5rem; font-weight: 800; font-family: var(--font-mono); }

    /* ── LISTS ─────────────────────────────────────────────────── */
    .entry-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8rem 0; border-bottom: 1px solid var(--border);
    }
    .entry-info div:first-child { font-weight: 700; font-size: 0.95rem; }
    .entry-info div:last-child { font-size: 0.75rem; color: var(--text-2); }
    .entry-cal { font-family: var(--font-mono); font-weight: 600; font-size: 0.9rem; }
    .entry-cal.neg { color: var(--rose); }

    /* ── NAV & SETTINGS ────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: rgba(6,10,18,0.8);
      backdrop-filter: blur(12px); border-top: 1px solid var(--border);
      display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 0.75rem; z-index: 100;
    }
    .nav-btn { background: none; border: none; color: var(--text-3); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
    .nav-btn.active { color: var(--lime); }

    .hidden { display: none; }
    #toast {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      background: var(--lime); color: var(--bg); padding: 0.5rem 1rem;
      border-radius: 20px; font-weight: 700; font-size: 0.8rem; z-index: 200;
      opacity: 0; transition: 0.3s; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="toast">Cargando...</div>

<div class="container">
  <div class="header">
    <div class="brand">VITATRACK</div>
    <div id="syncBadge" class="sync-badge">Offline</div>
  </div>

  <div class="profile-tabs">
    <button id="tabA" class="p-tab active" onclick="switchProfile('A')">PERFIL A</button>
    <button id="tabB" class="p-tab" onclick="switchProfile('B')">PERFIL B</button>
  </div>

  <div id="view-today">
    <div class="card" id="summaryCard">
      <div id="profileSnippet">
        </div>
      <div class="balance-grid">
        <div class="balance-card cal">
          <div class="balance-title">Restantes</div>
          <div class="balance-val" id="calBalance">0</div>
        </div>
        <div class="balance-card">
          <div class="balance-title">Consumidas</div>
          <div class="balance-val" id="calIn">0</div>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-title">➕ Registrar Comida</div>
      <div class="form-group">
        <label>Buscar Alimento (Open Food Facts)</label>
        <div style="display: flex; gap: 0.5rem;">
          <input type="text" id="foodSearch" placeholder="Avena, Pollo, Galletas..." />
          <button class="btn-primary" style="width: auto; padding: 0 1rem;" onclick="searchFoodAPI()">🔍</button>
        </div>
      </div>
      <div class="form-group" id="apiResultsWrapper" style="display:none;">
        <label>Selecciona resultado</label>
        <select id="apiResults" onchange="selectApiProduct()"></select>
      </div>
      <div class="form-group">
        <label>Alimento</label>
        <input type="text" id="foodName" placeholder="Ej: Cena" />
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Cantidad</label>
          <input type="number" id="foodQty" value="100" oninput="recalcFoodKcal()" />
        </div>
        <div class="form-group">
          <label>Unidad</label>
          <select id="foodUnit" onchange="recalcFoodKcal()">
            <option value="g">Gramos (g)</option>
            <option value="ml">Mililitros (ml)</option>
            <option value="unidad">Unidad / Porción</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Calorías (kcal)</label>
        <input type="number" id="foodCalories" placeholder="0" />
      </div>
      <button class="btn-primary" onclick="submitFood()">Guardar Comida</button>
    </div>

    <div class="form-card">
      <div class="form-title">🏃 Registrar Ejercicio</div>
      <div class="form-group">
        <label>Actividad</label>
        <select id="exName" onchange="autoCalcExercise()">
          <option value="caminar" data-met="3.5">🚶 Caminar</option>
          <option value="correr" data-met="8.0">🏃 Correr</option>
          <option value="pesas" data-met="5.0">🏋️ Pesas / Fuerza</option>
          <option value="ciclismo" data-met="7.5">🚲 Ciclismo</option>
          <option value="natacion" data-met="7.0">🏊 Natación</option>
          <option value="yoga" data-met="2.5">🧘 Yoga</option>
        </select>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Tiempo (min)</label>
          <input type="number" id="exDuration" value="30" oninput="autoCalcExercise()" />
        </div>
        <div class="form-group">
          <label>Intensidad</label>
          <select id="exIntensity" onchange="autoCalcExercise()">
            <option value="0.8">Baja</option>
            <option value="1.0" selected>Media</option>
            <option value="1.3">Alta / Vigorosa</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Calorías Quemadas</label>
        <input type="number" id="exCalories" placeholder="0" />
      </div>
      <button class="btn-primary" onclick="submitExercise()">Guardar Ejercicio</button>
    </div>

    <div class="card">
      <div class="form-title">Registros de Hoy</div>
      <div id="entryList">
        </div>
    </div>
  </div>

  <div id="view-settings" class="hidden">
    <div class="card">
      <div class="form-title">Configuración Perfil <span id="setProfLabel">A</span></div>
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="setNombre" placeholder="Tu nombre" />
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Peso (kg)</label>
          <input type="number" id="setPeso" step="0.1" oninput="autoCalcExercise()" />
        </div>
        <div class="form-group">
          <label>Altura (cm)</label>
          <input type="number" id="setAltura" />
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Edad</label>
          <input type="number" id="setEdad" />
        </div>
        <div class="form-group">
          <label>Género</label>
          <select id="setGenero">
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Nivel de Actividad</label>
        <select id="setActividad">
          <option value="1.2">Sedentario</option>
          <option value="1.375">Ligero (1-3 días)</option>
          <option value="1.55">Moderado (3-5 días)</option>
          <option value="1.725">Fuerte (6-7 días)</option>
        </select>
      </div>
      <button class="btn-primary" onclick="saveSettings()">Guardar Perfil</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="nav('today')">Hoy</button>
  <button class="nav-btn" onclick="nav('settings')">Ajustes</button>
  <button class="nav-btn" onclick="forceSync()">Sincronizar</button>
</div>

<script>
/* ── CONFIG & STATE ────────────────────────────────────────── */
const CONFIG = {
  scriptUrl: 'TU_WEB_APP_URL_AQUI' // URL de tu Code.gs publicado
};

let state = {
  profile: 'A',
  profiles: {
    A: { name: '', weight: 0, height: 0, age: 0, gender: 'M', activity: 1.2, configured: false },
    B: { name: '', weight: 0, height: 0, age: 0, gender: 'M', activity: 1.2, configured: false }
  },
  entries: { A: [], B: [] }
};

let currentKcalPer100 = 0;

/* ── API NUTRICIÓN (OPEN FOOD FACTS) ────────────────────────── */
async function searchFoodAPI() {
  const query = document.getElementById('foodSearch').value.trim();
  if (!query) return;
  
  showToast('Buscando...');
  try {
    const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=8`);
    const data = await res.json();
    const select = document.getElementById('apiResults');
    select.innerHTML = '<option value="">-- Selecciona producto --</option>';
    
    if (data.products && data.products.length > 0) {
      data.products.forEach(p => {
        const kcal = p.nutriments?.['energy-kcal_100g'] || 0;
        if(kcal > 0) {
          const opt = document.createElement('option');
          opt.value = kcal;
          opt.textContent = `${p.product_name} (${Math.round(kcal)} kcal/100g)`;
          opt.setAttribute('data-name', p.product_name);
          select.appendChild(opt);
        }
      });
      document.getElementById('apiResultsWrapper').style.display = 'block';
      showToast('¡Listo!');
    }
  } catch (e) { showToast('Error API'); }
}

function selectApiProduct() {
  const sel = document.getElementById('apiResults');
  const opt = sel.options[sel.selectedIndex];
  if (!opt.value) return;
  
  currentKcalPer100 = parseFloat(opt.value);
  document.getElementById('foodName').value = opt.getAttribute('data-name');
  recalcFoodKcal();
}

function recalcFoodKcal() {
  const qty = parseFloat(document.getElementById('foodQty').value) || 0;
  const unit = document.getElementById('foodUnit').value;
  let factor = (unit === 'unidad') ? 50 : qty; // si es unidad asumimos peso promedio 50g
  document.getElementById('foodCalories').value = Math.round((currentKcalPer100 / 100) * factor);
}

/* ── MOTOR DE EJERCICIO ────────────────────────────────────── */
function autoCalcExercise() {
  const selectEx = document.getElementById('exName');
  const duration = parseFloat(document.getElementById('exDuration').value) || 0;
  const intensity = parseFloat(document.getElementById('exIntensity').value);
  const met = parseFloat(selectEx.options[selectEx.selectedIndex].getAttribute('data-met'));
  
  // Peso del perfil actual
  const weight = state.profiles[state.profile].weight || 70;
  const burned = (met * intensity * 3.5 * weight / 200) * duration;
  
  document.getElementById('exCalories').value = Math.round(burned);
}

/* ── LÓGICA DE NEGOCIO / SYNC ──────────────────────────────── */
function switchProfile(p) {
  state.profile = p;
  document.getElementById('tabA').className = p === 'A' ? 'p-tab active' : 'p-tab';
  document.getElementById('tabB').className = p === 'B' ? 'p-tab active' : 'p-tab';
  renderAll();
}

function saveSettings() {
  const p = state.profile;
  state.profiles[p] = {
    name: document.getElementById('setNombre').value,
    weight: parseFloat(document.getElementById('setPeso').value),
    height: parseFloat(document.getElementById('setAltura').value),
    age: parseInt(document.getElementById('setEdad').value),
    gender: document.getElementById('setGenero').value,
    activity: parseFloat(document.getElementById('setActividad').value),
    configured: true
  };
  localStorage.setItem('vt_profiles', JSON.stringify(state.profiles));
  syncProfileToCloud(p);
  nav('today');
  renderAll();
}

function submitFood() {
  const entry = {
    id: Date.now(),
    type: 'food',
    name: document.getElementById('foodName').value || 'Comida',
    cal: parseInt(document.getElementById('foodCalories').value) || 0,
    ts: new Date().toISOString()
  };
  addEntry(entry);
}

function submitExercise() {
  const entry = {
    id: Date.now(),
    type: 'exercise',
    name: document.getElementById('exName').value,
    cal: -(parseInt(document.getElementById('exCalories').value) || 0),
    ts: new Date().toISOString()
  };
  addEntry(entry);
}

function addEntry(entry) {
  state.entries[state.profile].unshift(entry);
  localStorage.setItem(`vt_entries_${state.profile}`, JSON.stringify(state.entries[state.profile]));
  saveEntryToCloud(entry);
  renderAll();
  // Limpiar campos
  document.getElementById('foodName').value = '';
  document.getElementById('foodCalories').value = '';
}

/* ── RENDERIZADO ───────────────────────────────────────────── */
function renderAll() {
  const p = state.profiles[state.profile];
  const entries = state.entries[state.profile];
  
  // 1. Cálculos de Salud
  let tdee = 2000;
  if (p.configured) {
    const bmr = (p.gender === 'M') 
      ? (10 * p.weight + 6.25 * p.height - 5 * p.age + 5)
      : (10 * p.weight + 6.25 * p.height - 5 * p.age - 161);
    tdee = Math.round(bmr * p.activity);
    
    const imc = (p.weight / ((p.height/100)**2)).toFixed(1);
    document.getElementById('profileSnippet').innerHTML = `
      <div style="font-family:var(--font-mono); font-size:0.7rem; color:var(--text-2); margin-bottom:0.5rem;">
        IMC: ${imc} • TDEE: ${tdee} kcal
      </div>
    `;
  }

  // 2. Balance
  const calIn = entries.reduce((acc, curr) => acc + (curr.cal > 0 ? curr.cal : 0), 0);
  const calOut = entries.reduce((acc, curr) => acc + (curr.cal < 0 ? Math.abs(curr.cal) : 0), 0);
  const balance = tdee - calIn + calOut;

  document.getElementById('calIn').textContent = calIn;
  document.getElementById('calBalance').textContent = balance;
  document.getElementById('calBalance').style.color = balance < 0 ? 'var(--rose)' : 'var(--lime)';

  // 3. Lista
  const list = document.getElementById('entryList');
  list.innerHTML = entries.map(e => `
    <div class="entry-item">
      <div class="entry-info">
        <div>${e.name}</div>
        <div>${new Date(e.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
      </div>
      <div class="entry-cal ${e.cal < 0 ? '' : 'neg'}">
        ${e.cal > 0 ? '+' : ''}${e.cal} kcal
      </div>
    </div>
  `).join('');
}

/* ── NAVEGACIÓN Y TOAST ────────────────────────────────────── */
function nav(view) {
  document.getElementById('view-today').classList.toggle('hidden', view !== 'today');
  document.getElementById('view-settings').classList.toggle('hidden', view !== 'settings');
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && view === 'today') || (i === 1 && view === 'settings'));
  });
  if(view === 'settings') {
    const p = state.profiles[state.profile];
    document.getElementById('setProfLabel').textContent = state.profile;
    document.getElementById('setNombre').value = p.name || '';
    document.getElementById('setPeso').value = p.weight || '';
    document.getElementById('setAltura').value = p.height || '';
    document.getElementById('setEdad').value = p.age || '';
    document.getElementById('setGenero').value = p.gender;
    document.getElementById('setActividad').value = p.activity;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2000);
}

/* ── SYNC CLOUD (PLACEHOLDERS) ──────────────────────────────── */
async function saveEntryToCloud(entry) {
  if (!CONFIG.scriptUrl.includes('TU_WEB_APP')) {
    fetch(`${CONFIG.scriptUrl}?action=addEntry&profile=${state.profile}&data=${JSON.stringify(entry)}`);
  }
}

async function syncProfileToCloud(p) {
  if (!CONFIG.scriptUrl.includes('TU_WEB_APP')) {
    fetch(`${CONFIG.scriptUrl}?action=setProfile&profile=${p}&data=${JSON.stringify(state.profiles[p])}`);
  }
}

// Carga Inicial
window.onload = () => {
  const savedP = localStorage.getItem('vt_profiles');
  if(savedP) state.profiles = JSON.parse(savedP);
  
  ['A','B'].forEach(p => {
    const ent = localStorage.getItem(`vt_entries_${p}`);
    if(ent) state.entries[p] = JSON.parse(ent);
  });
  
  renderAll();
};
</script>

</body>
</html>
