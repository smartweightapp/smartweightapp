# ════════════════════════════════════════════════════════════════
#  VitaTrack — GitHub Actions Deploy Pipeline
#  Injects secrets at build-time and deploys to GitHub Pages.
#
#  REQUIRED SECRETS (Settings → Secrets → Actions → New repository secret):
#
#    APPS_SCRIPT_URL        → Full URL of your deployed Google Apps Script
#                             e.g. https://script.google.com/macros/s/AKfy.../exec
#    NUTRITIONIX_APP_ID   → App ID from developer.nutritionix.com (free tier)
#    NUTRITIONIX_APP_KEY  → App Key from developer.nutritionix.com (free tier)
#
#  OPTIONAL SECRETS (extend as needed):
#    PROFILE_A_NAME  or PROFILE_NAME_A  → Display name for User A (default: "Usuario A")
#    PROFILE_B_NAME  or PROFILE_NAME_B  → Display name for User B (default: "Usuario B")
#
#  HOW IT WORKS:
#    1. Checks out your source (index.html has __APPS_SCRIPT_URL__ as placeholder)
#    2. sed replaces every token with the real secret value
#    3. Uploads the substituted file to GitHub Pages
#    The real URL is NEVER committed to git — it only exists in the deployed artifact.
# ════════════════════════════════════════════════════════════════

name: Deploy VitaTrack to GitHub Pages

on:
  push:
    branches: [ "main" ]        # Deploy on every push to main
  workflow_dispatch:             # Allow manual trigger from Actions tab

# Grant GITHUB_TOKEN write access to Pages
permissions:
  contents: read
  pages:    write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout source ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Validate required secrets ───────────────────────────
      - name: Validate secrets are set
        run: |
          if [ -z "${{ secrets.APPS_SCRIPT_URL }}" ]; then
            echo "::error::Secret APPS_SCRIPT_URL is not set."
            echo "::error::Go to Settings → Secrets → Actions → New repository secret"
            exit 1
          fi
          echo "✓ APPS_SCRIPT_URL secret is present"

      # ── 3. Create dist/ folder ──────────────────────────────────
      - name: Prepare dist directory
        run: mkdir -p dist

      # ── 4. Inject secrets via sed ───────────────────────────────
      #  Uses a separator that will never appear in a URL (|)
      #  so we don't need to escape forward slashes.
      - name: Inject secrets into index.html
        env:
          APPS_SCRIPT_URL:       ${{ secrets.APPS_SCRIPT_URL }}
          NUTRITIONIX_APP_ID:    ${{ secrets.NUTRITIONIX_APP_ID }}
          NUTRITIONIX_APP_KEY:   ${{ secrets.NUTRITIONIX_APP_KEY }}
        run: |
          sed "s|__APPS_SCRIPT_URL__|${APPS_SCRIPT_URL}|g" index.html > dist/index.html
          echo "✓ Token __APPS_SCRIPT_URL__ substituted"
          # Nutritionix: substitute if secrets are set, else leave token (app handles missing keys gracefully)
          if [ -n "$NUTRITIONIX_APP_ID" ]; then
            sed -i "s|__NUTRITIONIX_APP_ID__|${NUTRITIONIX_APP_ID}|g" dist/index.html
            echo "✓ Token __NUTRITIONIX_APP_ID__ substituted"
          else
            sed -i "s|__NUTRITIONIX_APP_ID__||g" dist/index.html
            echo "ℹ NUTRITIONIX_APP_ID not set — app will use MET fallback"
          fi
          if [ -n "$NUTRITIONIX_APP_KEY" ]; then
            sed -i "s|__NUTRITIONIX_APP_KEY__|${NUTRITIONIX_APP_KEY}|g" dist/index.html
            echo "✓ Token __NUTRITIONIX_APP_KEY__ substituted"
          else
            sed -i "s|__NUTRITIONIX_APP_KEY__||g" dist/index.html
            echo "ℹ NUTRITIONIX_APP_KEY not set — app will use MET fallback"
          fi

      # ── 5. Inject optional profile names ──────────────────────
      - name: Inject optional profile names
        env:
          # Both naming conventions supported:
          #   PROFILE_A_NAME  and  PROFILE_B_NAME   (documented standard)
          #   PROFILE_NAME_A  and  PROFILE_NAME_B   (alternate order)
          PROFILE_A_NAME:  ${{ secrets.PROFILE_A_NAME  || secrets.PROFILE_NAME_A }}
          PROFILE_B_NAME:  ${{ secrets.PROFILE_B_NAME  || secrets.PROFILE_NAME_B }}
        run: |
          if [ -n "$PROFILE_A_NAME" ]; then
            sed -i "s|__PROFILE_A_NAME__|${PROFILE_A_NAME}|g" dist/index.html
            echo "✓ Profile A name injected: $PROFILE_A_NAME"
          else
            sed -i "s|__PROFILE_A_NAME__|Usuario A|g" dist/index.html
            echo "ℹ Profile A using default: Usuario A"
          fi
          if [ -n "$PROFILE_B_NAME" ]; then
            sed -i "s|__PROFILE_B_NAME__|${PROFILE_B_NAME}|g" dist/index.html
            echo "✓ Profile B name injected: $PROFILE_B_NAME"
          else
            sed -i "s|__PROFILE_B_NAME__|Usuario B|g" dist/index.html
            echo "ℹ Profile B using default: Usuario B"
          fi

      # ── 6. Security audit — ensure no tokens leaked ────────────
      - name: Security audit — verify no raw tokens in dist
        run: |
          echo "Scanning dist/index.html for unreplaced tokens..."
          FAILED=0
          if grep -q "__APPS_SCRIPT_URL__" dist/index.html; then
            echo "::error::SECURITY: Token __APPS_SCRIPT_URL__ was NOT replaced. Check that the secret is set."
            FAILED=1
          fi
          if grep -q "__PROFILE_A_NAME__" dist/index.html; then
            echo "::error::Token __PROFILE_A_NAME__ was NOT replaced."
            FAILED=1
          fi
          if grep -q "__PROFILE_B_NAME__" dist/index.html; then
            echo "::error::Token __PROFILE_B_NAME__ was NOT replaced."
            FAILED=1
          fi
          # Nutritionix tokens are OPTIONAL — warn but do not fail
          if grep -q "__NUTRITIONIX_APP_ID__" dist/index.html; then
            echo "::warning::NUTRITIONIX_APP_ID not replaced — calorie estimation will use offline fallback (MET formula)"
          fi
          if grep -q "__NUTRITIONIX_APP_KEY__" dist/index.html; then
            echo "::warning::NUTRITIONIX_APP_KEY not replaced — calorie estimation will use offline fallback (MET formula)"
          fi
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          if grep -qE "script\.google\.com/macros/s/[A-Za-z0-9_-]{10,}" dist/index.html; then
            echo "::notice::Apps Script URL present in artifact (expected — injected from secret)."
          fi
          echo "✓ Security audit passed — all tokens replaced"

      # ── 7. Copy any extra static assets (favicon, etc.) ────────
      - name: Copy static assets
        run: |
          # Copy any extra files (images, manifest, etc.) if they exist
          for f in favicon.ico favicon.png apple-touch-icon.png manifest.json robots.txt; do
            [ -f "$f" ] && cp "$f" dist/ && echo "Copied $f" || true
          done

      # ── 8. Upload artifact to Pages ────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      # ── 9. Deploy ──────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── 10. Post-deploy summary ────────────────────────────────
      - name: Deployment summary
        run: |
          echo "## ✅ VitaTrack deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "🔒 **Apps Script URL:** injected from secret (not visible in source)" >> $GITHUB_STEP_SUMMARY
          echo "🥗 **Nutritionix:** ${{ secrets.NUTRITIONIX_APP_ID != '' && 'configured' || 'not set — using MET fallback' }}" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Deployed at:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
